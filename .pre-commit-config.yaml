# Pre-commit hook configuration.
# Install with: pre-commit install
# Run manually: pre-commit run --all-files
# Update hook versions: pre-commit autoupdate

default_install_hook_types: [pre-commit, pre-push]

repos:
  # Standard pre-commit hooks for basic hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: detect-private-key

  # Ruff: lint + format
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Gitleaks: secret scanning
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks

  # Local hooks (defined in this repo, not pulled from elsewhere)
  - repo: local
    hooks:
      - id: no-direct-push-to-main
        name: Prevent direct push to main
        language: system
        entry: powershell -NoProfile -Command "if ((git symbolic-ref --short HEAD) -eq 'main') { Write-Host 'Refusing to push directly to main. Create a feature branch and open a PR.' -ForegroundColor Red; exit 1 }"
        stages: [pre-push]
        always_run: true
        pass_filenames: false
