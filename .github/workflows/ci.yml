# GitHub Actions CI workflow for pdfprism.
# Runs on every push to any branch and on every pull request to main.

name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

env:
  QT_QPA_PLATFORM: offscreen

jobs:
  lint-and-test:
    name: Lint and test (Python 3.13)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install system dependencies for PySide6
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libxkbcommon0 \
            libfontconfig1 \
            libdbus-1-3

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Run tests
        run: uv run pytest
